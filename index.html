          { name: "Kombi Fuß-/Beinmassage", preis: "75 €" },
          { name: "Anti-Stress Express", preis: "50 €" },
          { name: "Fußreflexzonenmassage", preis: "50 €" },
          { name: "Cleopatra", preis: "184 €" }
        ]
      }
    }
  };

  function detectSalon(t) {
    if (t.match(/bogenhausen|ismaninger/)) return 'bogenhausen';
    if (t.match(/feilitzsch|freiheit|derma/)) return 'feilitzsch';
    if (t.match(/innenstadt|brunns|zentrum|altstadt|mitte/)) return 'innenstadt';
    if (t.match(/schwabing|herzog/)) return 'schwabing';
    return null;
  }

  function salonPreisBlock(salonKey, kategorie) {
    var s = SALONS[salonKey];
    var items = s.preise[kategorie];
    if (!items) return '';
    return items.map(function(i){ return '• ' + i.name + ': **' + i.preis + '**' + (i.dauer ? ' (' + i.dauer + ')' : ''); }).join('\n');
  }

  function localReply(raw) {
    var t = (raw || '').toLowerCase();
    var salonKey = detectSalon(t);
    var salon = salonKey ? SALONS[salonKey] : null;

    var isDamen = t.match(/damen|dame|frau|frauen|ladies/);
    var isHerren = t.match(/herren|herr|mann|männer/);
    var isSchnitt = t.match(/schnitt|schneiden|haarschnitt/);
    var isFarbe = t.match(/farbe|färben|coloration|strähnen|balayage|ombré|ombre|cover grey|ansatz/);
    var isMassage = t.match(/massage|massagen|ayurveda|lomi|entspannung|sport|büromassage/);
    var isFacial = t.match(/facial|gesicht|gesichtsbehandlung|face/);
    var isKopfhaut = t.match(/kopfhaut|schuppen|kopfmassage/);
    var isPreis = t.match(/preis|kostet|kosten|wie viel|wieviel/);
    var isTermin = t.match(/termin|buchen|booking/);
    var isOeffnung = t.match(/öffnung|geöffnet|offen|zeiten|wann/);
    var isWo = t.match(/wo|adresse|standort|salon|salons/);

    // Preisfragen mit Salon + Kategorie
    if (isPreis || isSchnitt || isFarbe || isMassage || isFacial || isKopfhaut) {
      if (salon) {
        var antwort = '**' + salon.name + '**\n\n';
        if (isDamen && isSchnitt) {
          antwort += '**Damenschnitte:**\n' + salonPreisBlock(salonKey, 'damen_schnitt');
        } else if (isHerren && isSchnitt) {
          antwort += '**Herrenschnitte:**\n' + salonPreisBlock(salonKey, 'herren_schnitt');
        } else if (isSchnitt) {
          antwort += '**Damenschnitte:**\n' + salonPreisBlock(salonKey, 'damen_schnitt') + '\n\n**Herrenschnitte:**\n' + salonPreisBlock(salonKey, 'herren_schnitt');
        } else if (isFarbe) {
          antwort += '**Farbbehandlungen:**\n' + salonPreisBlock(salonKey, 'farbe');
        } else if (isMassage && (salonKey === 'feilitzsch' || salonKey === 'bogenhausen')) {
          antwort += '**Massagen:**\n' + salonPreisBlock(salonKey, 'massagen');
        } else if (isFacial && (salonKey === 'feilitzsch' || salonKey === 'bogenhausen')) {
          antwort += '**Gesichtsbehandlungen:**\n' + salonPreisBlock(salonKey, 'facials');
        } else if (isKopfhaut) {
          antwort += '**Kopfhautbehandlungen:**\n' + salonPreisBlock(salonKey, 'kopfhaut');
        } else {
          // Allgemeine Preisfrage für diesen Salon
          antwort += '**Damenschnitte:**\n' + salonPreisBlock(salonKey, 'damen_schnitt') + '\n\n**Herrenschnitte:**\n' + salonPreisBlock(salonKey, 'herren_schnitt') + '\n\n**Farbbehandlungen (Auswahl):**\n• Organic Ansatzcoloration ab ' + salon.preise.farbe[0].preis + '\n• Balayage ab ' + salon.preise.farbe[8].preis;
        }
        antwort += '\n\n📞 ' + salon.tel + '\nTermine: ' + salon.book;
        return antwort;
      }
      // Kein Salon genannt
      if (isMassage) return 'Massagen gibt es in unseren **Derma Cosmetics Salons**:\n• **Feilitzschstraße** (📞 089 38888866)\n• **Bogenhausen** (📞 089 24210400)\n\nPreise ab 50 € (Kombi-Massagen) bis 125 € (90 Min. Massage). Welchen Salon möchtest du?';
      if (isFacial) return 'Gesichtsbehandlungen gibt es in unseren **Derma Cosmetics Salons**:\n• **Feilitzschstraße** (📞 089 38888866)\n• **Bogenhausen** (📞 089 24210400)\n\nPreise: 50 € (30 Min.) oder 90 € (60 Min.). Welchen Salon möchtest du?';
      if (isDamen && isSchnitt) return 'Damenschnitte kosten je nach Salon:\n• **Schwabing**: ab 49 €\n• **Innenstadt**: ab 49 € (Chef Cut 89 €)\n• **Feilitzschstraße**: ab 49 €\n• **Bogenhausen**: ab 49 € (Chef Cut 89 €)\n\nWelcher Salon liegt dir am nächsten?';
      if (isHerren && isSchnitt) return 'Herrenschnitte kosten je nach Salon:\n• **Schwabing**: 55 €\n• **Innenstadt**: 59 € (Chef Cut 69 €)\n• **Feilitzschstraße**: 59 €\n• **Bogenhausen**: 59 € (Chef Cut 69 €)\n\nWelcher Salon liegt dir am nächsten?';
      return 'Unsere Preise variieren je nach Salon und Leistung. Für welchen Standort und welche Behandlung interessierst du dich?\n\n**Unsere Salons:**\n• Schwabing, Innenstadt (nur Haare)\n• Feilitzschstraße, Bogenhausen (Haare + Massagen + Kosmetik)';
    }

    if (isTermin) {
      if (salon) return 'Termine für **' + salon.name + '** buchst du hier:\n' + salon.book + '\n\nOder ruf an: 📞 ' + salon.tel;
      return 'Termine online buchen:\n• Schwabing: https://buchung.treatwell.de/ort/biohairspa-muenchen-herzogstr\n• Innenstadt: https://buchung.treatwell.de/ort/biohairspa-muenchen-innenstadt/\n• Feilitzschstraße: https://buchung.treatwell.de/ort/biohairspa-derma-cosmetics-feilitzschstrasse/\n• Bogenhausen: https://buchung.treatwell.de/ort/biohairspa-derma-cosmetics-bogenhausen/';
    }

    if (isOeffnung) {
      if (salon) return '**' + salon.name + '**\n🕑 ' + salon.hours + '\n\n(Montag & Sonntag geschlossen)';
      return 'Alle Salons sind **Di–Sa 09:00–19:00** geöffnet.\n(Montag & Sonntag geschlossen)\n\n📞 Schwabing: 089 3081984\n📞 Innenstadt: 089 24212477\n📞 Feilitzschstraße: 089 38888866\n📞 Bogenhausen: 089 24210400';
    }

    if (isWo) {
      return 'Wir haben **4 Salons in München**:\n\n• **Schwabing** – Herzogstraße 119\n• **Innenstadt** – Brunnstraße 9\n• **Feilitzschstraße** – Feilitzschstraße 14 (Derma Cosmetics)\n• **Bogenhausen** – Ismaninger Straße 42 (Derma Cosmetics)\n\nWelcher Salon interessiert dich?';
    }

    return 'Ich helfe dir gern! 🌿 Ich kann dir bei **Preisen**, **Terminen**, **Öffnungszeiten** und unseren **4 Salons** weiterhelfen. Was möchtest du wissen?';
  }

  var history = [];

  function aiReply(userText) {
    history.push({ role: 'user', content: userText });
    return fetch(AI_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history.slice(-12) })
    })
    .then(function(r) { return r.text().then(function(t) { try { return JSON.parse(t); } catch(e) { return {}; } }); })
    .then(function(d) {
      var reply = (d && (d.reply || d.text || d.content));
      if (!reply || reply.indexOf('Schluckauf') !== -1 || reply.indexOf('klemmt') !== -1) {
        reply = localReply(userText);
      }
      history.push({ role: 'assistant', content: reply });
      return reply;
    })
    .catch(function() {
      var r = localReply(userText);
      history.push({ role: 'assistant', content: r });
      return r;
    });
  }

  var widget = document.getElementById('bhs-widget');
  var scroll = document.getElementById('bhs-scroll');
  var quickWrap = document.getElementById('bhs-quick');
  var input = document.getElementById('bhs-text');
  var greeted = false;

  function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(text) {
    var h = esc(text || '');
    h = h.replace(/(https?:\/\/[^\s)]+)(?=[)\s]|$)/g, function(u){ var c=u.replace(/[.,;]$/,''); return '<a href="'+c+'" target="_blank" rel="noopener">'+c.replace(/^https?:\/\//,'')+'</a>'; });
    h = h.replace(/(089[\s]?\d{6,8})/g, function(p){ var tel='+49'+p.replace(/[^\d]/g,'').replace(/^0/,''); return '<a href="tel:'+tel+'">'+p+'</a>'; });
    h = h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    h = h.replace(/\n/g,'<br>');
    return h;
  }

  function addMessage(role, text) {
    var row = document.createElement('div');
    row.className = 'bhs-row ' + role;
    var b = document.createElement('div');
    b.className = 'bhs-bubble';
    b.innerHTML = fmt(text);
    row.appendChild(b);
    scroll.appendChild(row);
    scroll.scrollTop = scroll.scrollHeight;
  }

  function showTyping() {
    var row = document.createElement('div');
    row.className = 'bhs-row bot';
    row.id = 'bhs-typing-row';
    row.innerHTML = '<div class="bhs-typing"><span></span><span></span><span></span></div>';
    scroll.appendChild(row);
    scroll.scrollTop = scroll.scrollHeight;
  }

  function hideTyping() {
    var r = document.getElementById('bhs-typing-row');
    if (r) r.remove();
  }

  function renderQuick() {
    quickWrap.innerHTML = '';
    var show = scroll.querySelectorAll('.bhs-row.user').length === 0;
    quickWrap.style.display = show ? 'flex' : 'none';
    if (!show) return;
    QUICK.forEach(function(q) {
      var btn = document.createElement('button');
      btn.textContent = q.label;
      btn.addEventListener('click', function(){ sendText(q.q); });
      quickWrap.appendChild(btn);
    });
  }

  var busy = false;
  function sendText(text) {
    var t = (text || '').trim();
    if (!t || busy) return;
    busy = true;
    addMessage('user', t);
    input.value = '';
    input.style.height = 'auto';
    renderQuick();
    showTyping();
    aiReply(t).then(function(reply) {
      hideTyping();
      addMessage('bot', reply);
      busy = false;
    });
  }

  function openChat() {
    widget.classList.add('open');
    if (!greeted) { addMessage('bot', GREETING); renderQuick(); greeted = true; }
    setTimeout(function(){ input.focus(); }, 60);
  }

  function closeChat() { widget.classList.remove('open'); }

  document.getElementById('bhs-launch').addEventListener('click', function(){ widget.classList.contains('open') ? closeChat() : openChat(); });
  document.getElementById('bhs-close').addEventListener('click', closeChat);
  document.getElementById('bhs-send').addEventListener('click', function(){ sendText(input.value); });
  input.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendText(input.value); } });
  input.addEventListener('input', function(){ input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 96)+'px'; });
})();
</script>
</body></html>
